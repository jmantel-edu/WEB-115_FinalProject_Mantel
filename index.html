<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJA File Player</title>
    <link rel="stylesheet" href="styles.css">
    <script src="converter.js" defer></script>
    <script src="preview.js" defer></script>
    <script src="game.js" defer></script>

</head>
<body>
    <h1 id="hero">TJA File Player</h1>
    <canvas id="game" width="1000" height="563">If you see this text, this browser does not support HTML Canvas. Please use another browser!</canvas>
    <h2>Preview</h2>
    <div class="preview" id="preview"></div>
    <h2>Upload a Song</h2>
    <div id="songSelect">
        <div id="uploadSection">
            <input type="file" id="uploadTJA"><label for="uploadTJA">Upload TJA</label><br>
            <input type="file" id="uploadSound"><label for="uploadSound">Upload Sound File</label>
        </div>
        <input type="button" id="addSong" value="Load Song">
    </div>
    <h3>Current TJA file (for debug purposes)</h3>
    <code id="myTJA"></code>
</body>
</html>
